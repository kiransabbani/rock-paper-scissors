<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="rps.css">
</head>
<body>

  <p class="title">Rock Paper Scissors</p>

  <button class="move-button" onclick="playGame('rock')">
    <img src="rock.png" class="icon">
  </button>

  <button class="move-button" onclick="playGame('paper')">
    <img src="paper.png" class="icon">
  </button>

  <button class="move-button" onclick="playGame('scissors')">
    <img src="scissors.png" class="icon">
  </button>

  <p class="result"></p>

  <p class="move-display"></p>

  <p class="score"></p>

  <button onclick="resetScore()">Reset</button>

  <script src="rps.js"></script>

</body>
</html>
